syntax = "proto3";

option csharp_namespace = "Luna.Users.gRPC";

package user;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// User Service
service UserService {
  rpc GetUserById(GetUserByIdRequest) returns (GetUserByIdResponse);
  rpc GetUserByUsername(GetUserByUsernameRequest) returns (GetUserByUsernameResponse);
  rpc GetUsersByIds(GetUsersByIdsRequest) returns (GetUsersByIdsResponse);
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc UserExists(UserExistsRequest) returns (UserExistsResponse);
  rpc UserExistsByUsername(UserExistsByUsernameRequest) returns (UserExistsByUsernameResponse);
  rpc UpdateLastActive(UpdateLastActiveRequest) returns (UpdateLastActiveResponse);
}

// Messages
message UserMessage {
  string id = 1;
  string username = 2;
  string display_name = 3;
  string image = 4;
  string bio = 5;
  google.protobuf.Timestamp last_active = 6;
}

message UserBlankMessage {
  string id = 1;
  optional string username = 2;
  optional string display_name = 3;
  optional string image = 4;
  optional string bio = 5;
}

message ErrorMessage {
  string code = 1;
  string message = 2;
  string details = 3;
}

// Request/Response messages
message GetUserByIdRequest {
  string user_id = 1;
}

message GetUserByIdResponse {
  UserMessage user = 1;
  ErrorMessage error = 2;
}

message GetUserByUsernameRequest {
  string username = 1;
}

message GetUserByUsernameResponse {
  UserMessage user = 1;
  ErrorMessage error = 2;
}

message GetUsersByIdsRequest {
  repeated string user_ids = 1;
}

message GetUsersByIdsResponse {
  repeated UserMessage users = 1;
  ErrorMessage error = 2;
}

message CreateUserRequest {
  optional UserBlankMessage user = 1;
}

message CreateUserResponse {
  bool success = 1;
  ErrorMessage error = 2;
}

message UpdateUserRequest {
  string user_id = 1;
  UserBlankMessage user = 2;
}

message UpdateUserResponse {
  bool success = 1;
  ErrorMessage error = 2;
}

message DeleteUserRequest {
  string user_id = 1;
}

message DeleteUserResponse {
  bool success = 1;
  ErrorMessage error = 2;
}

message UserExistsRequest {
  string user_id = 1;
}

message UserExistsResponse {
  bool exists = 1;
  ErrorMessage error = 2;
}

message UserExistsByUsernameRequest {
  string username = 1;
}

message UserExistsByUsernameResponse {
  bool exists = 1;
  ErrorMessage error = 2;
}

message UpdateLastActiveRequest {
  string user_id = 1;
}

message UpdateLastActiveResponse {
  bool success = 1;
  ErrorMessage error = 2;
}
