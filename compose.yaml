services:
    # PostgreSQL
    postgres:
        container_name: postgres_luna
        image: postgres:16
        restart: on-failure
        environment:
            POSTGRES_USER: system
            POSTGRES_PASSWORD: system
            POSTGRES_MULTIPLE_DATABASES: "luna_database, luna_users, luna_auth, luna_workspaces, luna_activity, luna_pages"
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./postgres/init:/docker-entrypoint-initdb.d # Скрипты для инициализации
        ports:
            - "15432:5432"
        networks:
            - backend

    # MongoDB
    mongodb:
        image: mongo:latest
        container_name: mongodb
        restart: always
        environment:
            MONGO_INITDB_ROOT_USERNAME: system
            MONGO_INITDB_ROOT_PASSWORD: system
        volumes:
            - mongodb_data:/data/db
            - ./mongodb/init:/docker-entrypoint-initdb.d # Скрипты для инициализации
        ports:
            - "27017:27017"
        networks:
            - backend

    # RabbitMQ
    rabbitmq:
        image: rabbitmq:3-management-alpine
        container_name: rabbitmq
        restart: on-failure
        environment:
            RABBITMQ_DEFAULT_USER: system
            RABBITMQ_DEFAULT_PASS: system
        ports:
            - "5672:5672"   # AMQP порт
            - "15672:15672" # Management UI
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
        networks:
            - backend

    # Redis
    redis:
        image: redis:alpine
        container_name: redis
        restart: always
        command: redis-server --requirepass system
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        networks:
            - backend

    elasticsearch:
        image: elasticsearch:8.11.0
        container_name: elasticsearch
        restart: on-failure
        environment:
            - discovery.type=single-node
            - xpack.security.enabled=false
            - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
        ports:
            - "9200:9200"
            - "9300:9300"
        volumes:
            - elasticsearch_data:/usr/share/elasticsearch/data
            - ./elasticsearch/init:/docker-entrypoint-initdb.d
        networks:
            - backend

    kafka:
        image: confluentinc/cp-kafka:7.4.0
        container_name: kafka
        restart: on-failure
        user: root
        environment:
            KAFKA_NODE_ID: 1
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
            KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
            KAFKA_METRICS_REPORTERS: ''
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_PROCESS_ROLES: 'broker,controller'
            KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
            KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
            KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
            KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
            KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
            CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
        ports:
            - "9092:9092"
        volumes:
            - kafka_data:/tmp/kraft-combined-logs
        networks:
            - backend

    kafka-init:
        image: confluentinc/cp-kafka:7.4.0
        depends_on:
            - kafka
        entrypoint: [ "/bin/sh", "-c" ]
        command: |
            "for i in $$(seq 1 30); do
              if kafka-topics --bootstrap-server kafka:9092 --list >/dev/null 2>&1; then
                kafka-topics --bootstrap-server kafka:9092 --create --topic workspace-permission-events --partitions 1 --replication-factor 1 &&
                echo 'Topic created' && exit 0;
              fi;
              echo 'Waiting for kafka... ('$$i')';
              sleep 2;
            done;
            echo 'Failed to create topic' && exit 1"
        networks:
            - backend

    # Services
    luna.auth.api:
        image: luna.auth.api
        ports:
            - "7000:8080"
        environment:
            ASPNETCORE_ENVIRONMENT: Release
        build:
            context: .
            dockerfile: Luna.Auth.API/Dockerfile
        networks:
            - backend
        env_file:
            - "Luna.Auth.API/.env.local"


    luna.workspaces.api:
        image: luna.workspaces.api
        environment:
            ASPNETCORE_ENVIRONMENT: Release
        build:
            context: .
            dockerfile: Luna.Workspaces.API/Dockerfile
        networks:
            - backend
        depends_on:
            postgres:
                condition: service_started

    luna.users.api:
        image: luna.users.api
        environment:
            ASPNETCORE_ENVIRONMENT: Release
        build:
            context: .
            dockerfile: Luna.Users.API/Dockerfile
        networks:
            - backend

    luna.pages.api:
        image: luna.pages.api
        environment:
            ASPNETCORE_ENVIRONMENT: Release
        build:
            context: .
            dockerfile: Luna.Pages.API/Dockerfile
        networks:
            - backend
        depends_on:
            postgres:
                condition: service_started
            mongodb:
                condition: service_started

    luna.users.gRPC:
        image: luna.users.grpc
        environment:
            ASPNETCORE_ENVIRONMENT: Release
        build:
            context: .
            dockerfile: Luna.Users.gRPC/Dockerfile
        networks:
            - backend

    luna.gateway.api:
        image: luna.gateway.api
        container_name: luna_gateway
        environment:
            ASPNETCORE_ENVIRONMENT: Release
        ports:
            - "8000:8080"
        build:
            context: .
            dockerfile: Luna.Gateway.API/Dockerfile
        networks:
            - backend
        depends_on:
            - luna.auth.api

    luna.notification.api:
        image: luna.notification.api
        container_name: luna_notification
        environment:
            ASPNETCORE_ENVIRONMENT: Release
        build:
            context: .
            dockerfile: Luna.Notification.API/Dockerfile
        networks:
            - backend
        depends_on:
            - rabbitmq
        restart: on-failure

networks:
    backend:
        driver: bridge

volumes:
    postgres_data:
        driver: local
    mongodb_data:
        driver: local
    rabbitmq_data:
        driver: local
    redis_data:
        driver: local
    elasticsearch_data:
        driver: local
    kafka_data:
        driver: local
